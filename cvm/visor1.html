<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Visor 360</title>
    <!-- Importar A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <!-- Escena de A-Frame -->
    <a-scene>
      <!-- Cargar la imagen 360 como textura de un cielo esférico -->
      <a-sky src="coro_360.jpg" rotation="0 -130 0"></a-sky>
      
      <!-- Cámara para navegar -->
      <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
